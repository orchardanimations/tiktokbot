name: Generate Squad Artwork

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: 

# This gives the action permission to push files back to your repo
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Generate the Squad
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python check_models.py

      - name: Commit and Push to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Tell GitHub to track all 4 new files
          git add squad_lore.txt squad_member_1.jpg squad_member_2.jpg squad_member_3.jpg
          
          if ! git diff --staged --quiet; then
            git commit -m "Generated new squad artwork and lore"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit."
          fi
